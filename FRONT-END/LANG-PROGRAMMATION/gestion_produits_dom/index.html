<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jockey+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jolly+Lodger&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <title>Page d'accueil</title>
</head>
<body>
    <header>
        <h1 class="bg-primary text-center text-white p-3">Gestion de produits</h1>
    </header>
    <main>
        <section class="container mt-5">
            <button class="btn btn-primary p-2 rounded-5">Ajouter un produit</button>
            <div class="row">
                <div class="col-6">
                    <table class=" table table-striped table-hover">
                        <thead>            
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nom</th>
                                <th scope="col">Catégorie</th>
                                <th scope="col">Prix</th>
                                <th scope="col">Stock</th>
                            </tr>
                        </thead>
                        <tbody id="listeProduits">
                            <!-- <tr>
                                <th scope="row">1</th>
                                <td>PC</td>
                                <td>Electronique</td>
                                <td>1200</td>
                                <td>10</td>
                            </tr> -->
                        </tbody>
                    </table>
                </div>
                <div class="col-6">
                    <div class="card p-4 rounded-4">
                        <h3>Ajouter un produit</h3>
                        <div class="row">
                            <div class="col-6">
                                <label for="nom">Nom du produit</label>
                                <input type="text" id="nom" class="form-control mb-3 rounded-5" placeholder="Entrez le nom du produit">
                            </div>
                            
                            <div class="col-6">
                                <label for="categorie">Nom de la Catégorie</label>
                                <select id="categorie" class="form-select mb-3 rounded-5">
                                    <option value="">Choisir une catégorie</option>
                                    <option value="Electronique">Electronique</option>
                                    <option value="Vêtements">Vêtements</option>
                                    <option value="Maison">Maison</option>
                                </select>
                            </div>

                            <div class="col-6">
                                <label for="prix">Prix du produit</label>
                                <input type="number" id="prix" class="form-control mb-3 rounded-5" placeholder="0.00">
                            </div>
                            <div class="col-6">
                                <label for="stock">Stock du produit</label>
                                <input type="number" id="stock" class="form-control mb-4 rounded-5" placeholder="0">
                            </div>
                            <div class="d-flex justify-content-end">
                                <button id="btnSupprimer" class="btn btn-secondary col-2 me-3 rounded-5">Annuler</button>
                                <button id="btnAjouter" class="btn btn-success col-2 rounded-5">Ajouter</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

























    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script src="/assets/js/javascript.js"></script>
    
    <script>
        if (sessionStorage.getItem("scroll")) {
            window.scrollTo(0, sessionStorage.getItem("scroll"));
        }

        window.addEventListener("scroll", () => {
            sessionStorage.setItem("scroll", window.scrollY);
        });

        // Gestion du clic pour déplacer la barre bleue dans la sidebar
        const sidebarLinks = document.querySelectorAll('.sidebar-link');
        
        sidebarLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Empêche le saut de page pour la maquette
                
                // 1. On réinitialise tous les liens avec l'apparence "inactif"
                sidebarLinks.forEach(l => {
                    l.parentElement.classList.add('px-3');
                    l.className = 'nav-link sidebar-link text-secondary fw-bold d-flex align-items-center gap-3 p-3';
                });
                
                // 2. On applique l'apparence "actif" (avec barre bleue et fond clair) au lien cliqué
                this.parentElement.classList.remove('px-3');
                this.className = 'nav-link sidebar-link text-dark fw-bold d-flex align-items-center gap-3 border-start border-primary border-4 rounded-0 p-3 ps-4 bg-light';
            });
        });
    </script>

</body>
</html>
