            <div>

          </div>

            <div class="circle-icon rounded-circle bg-blur d-flex justify-content-center align-items-center text-white fs-4 me-3 flex-shrink-0">
              <i class="bi bi-cart3"></i>
            </div>
            <div>
              <h4>Produits affichés</h4>
              <div id="nbProduitsAffiches" class="fw-bold fs-5">Nombre</div>
            </div>
          </div>
        </div>
        <div id="listeProduits" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-3">

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="/assets/js/javascript.js"></script>

    <script>
      if (sessionStorage.getItem("scroll")) {
        window.scrollTo(0, sessionStorage.getItem("scroll"));
      }

      window.addEventListener("scroll", () => {
        sessionStorage.setItem("scroll", window.scrollY);
      });

      // Gestion du clic pour dÃ©placer la barre bleue dans la sidebar
      const sidebarLinks = document.querySelectorAll(".sidebar-link");

      sidebarLinks.forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault(); // EmpÃªche le saut de page pour la maquette

          // 1. On rÃ©initialise tous les liens avec l'apparence "inactif"
          sidebarLinks.forEach((l) => {
            l.parentElement.classList.add("px-3");
            l.className =
              "nav-link sidebar-link text-secondary fw-bold d-flex align-items-center gap-3 p-3";
          });

          // 2. On applique l'apparence "actif" (avec barre bleue et fond clair) au lien cliquÃ©
          this.parentElement.classList.remove("px-3");
          this.className =
            "nav-link sidebar-link text-dark fw-bold d-flex align-items-center gap-3 border-start border-primary border-4 rounded-0 p-3 ps-4 bg-light";
        });
      });
    </script>
