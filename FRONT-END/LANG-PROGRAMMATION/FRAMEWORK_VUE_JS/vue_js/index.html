<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <title>Page d'accueil</title>
</head>
<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <div class="container mt-5">
        <div id="app" class="row p-5 justify-content-center align-items-stretch">
            <div class="row">
                <div class="col-12 col-md-6">
                    <div class="card rounded-5 p-5 bg-primary h-100">
                        <h1 class="fw-bold text-center text-white mb-5">Information sur moi</h1>
                        <div class="row">
                            <div class="p-2 px-4 bg-light m-2 rounded-5 d-flex justify-content-between">
                                <span class="fw-bold">Nom </span> 
                                {{ user.nom }}
                            </div>
                            <div class="p-2 px-4 bg-light m-2 rounded-5 d-flex justify-content-between">
                                <span class="fw-bold">Prénom </span> 
                                {{ user.prenom }}
                            </div>
                            <div class="p-2 px-4 bg-light m-2 rounded-5 d-flex justify-content-between">
                                <span class="fw-bold">Fonction</span> 
                                {{ user.fonction }}
                            </div>
                            <div class="p-2 px-4 bg-light m-2 rounded-5 d-flex justify-content-between">
                                <span class="fw-bold">Tel </span> 
                                {{ user.tel }}
                            </div>
                            <div class="p-2 px-4 bg-light m-2 rounded-5 d-flex justify-content-between">
                                <span class="fw-bold">Email </span> 
                                {{ user.email }}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6">
                    <div class="card rounded-5 p-5 bg-primary h-100">
                        <h1 class="fw-bold text-center text-white mb-5">Champs à remplir</h1>
                        <input type="text" v-model="user.nom" class="form-control rounded-5 mb-3 mt-2" placeholder="Entrer votre nom">
                        <input type="text" v-model="user.prenom" class="form-control rounded-5 mb-3" placeholder="Entrer votre prenom">
                        <select name="fonction" id="fonction" class="form-select rounded-5 mb-3" v-model="user.fonction">
                            <option value="" disabled>Selectionner votre fonction</option>
                            <option value="Développeur Web">Développeur Web</option>
                            <option value="Designer Graphique">Designer Graphique</option>
                            <option value="Chef de Projet">Chef de Projet</option>
                            <option value="Data Analyst">Data Analyst</option>
                        </select>
                        <input type="tel" v-model="user.tel" class="form-control rounded-5 mb-3" maxlength="12" placeholder="Entrer votre tel">
                        <input type="email" v-model="user.email" class="form-control rounded-5 mb-3" placeholder="Entrer votre email">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/assets/js/javascript.js"></script>
</body>
</html>
