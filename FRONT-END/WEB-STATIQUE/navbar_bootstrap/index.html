<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <title>Tableau de Bord</title>
</head>
<body class="bg-light">
   <nav class="navbar navbar-expand-lg navbar-light bg-dark">
    <div class="container">

      <a class="navbar-brand" href="#">MonSite</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarContent">

        <span class="navbar-toggler-icon "></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link active" href="#">Accueil</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Services</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>

        </ul>
      </div>

    </div>
  </nav>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script>
        if (sessionStorage.getItem("scroll")) {
            window.scrollTo(0, sessionStorage.getItem("scroll"));
        }

        window.addEventListener("scroll", () => {
            sessionStorage.setItem("scroll", window.scrollY);
        });

        // Gestion du clic pour déplacer la barre bleue dans la sidebar
        const sidebarLinks = document.querySelectorAll('.sidebar-link');
        
        sidebarLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Empêche le saut de page pour la maquette
                
                // 1. On réinitialise tous les liens avec l'apparence "inactif"
                sidebarLinks.forEach(l => {
                    l.parentElement.classList.add('px-3');
                    l.className = 'nav-link sidebar-link text-secondary fw-bold d-flex align-items-center gap-3 p-3';
                });
                
                // 2. On applique l'apparence "actif" (avec barre bleue et fond clair) au lien cliqué
                this.parentElement.classList.remove('px-3');
                this.className = 'nav-link sidebar-link text-dark fw-bold d-flex align-items-center gap-3 border-start border-primary border-4 rounded-0 p-3 ps-4 bg-light';
            });
        });
    </script>

</body>
</html>
