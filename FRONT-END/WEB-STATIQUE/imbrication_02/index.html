<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>structure imbriquée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container min-vh-100 ">
        <!-- Header -->
        <div class="row">
            <div class="col-12 bg-dark text-center text-white border rounded p-5">
                <h1>Header</h1>
            </div>
        </div>
        <!-- Main -->
        <div class="row">
            <!-- Sidebar -->
            <div class="col-3 mt-4 mb-4">
                <div class="sidebar bg-dark text-white p-3 border rounded">
                    Sidebar
                </div>
            </div>

            <!-- Contenu -->
            <div class="col-9 mt-3">

                <!-- Ligne 1 -->
                <div class="row mb-3 mt-4">
                    <div class="col-6 ">
                        <div class="article bg-info p-3 border rounded">
                            Article
                        </div>
                        
                    </div>
                    <div class="col-6 ">
                        <div class="article bg-info p-3 border rounded">
                            Article
                        </div>
                        
                    </div>
                </div>

                <!-- Ligne 2 -->
                <div class="row mb-3">
                    <div class="col-12 ">
                        <div class="article bg-primary text-white p-3 border rounded">
                            Article
                        </div>
                    </div>  
                </div>

                <!-- Ligne 3 -->
                <div class="row mb-3">
                    <div class="col-12 ">
                        <div class="article bg-secondary text-white p-3 border rounded">
                            Article
                        </div>
                    </div>
                    
                </div>

               
            </div>

        </div>
    </div>
    <footer class="bg-dark text-white p-5 text-center">© 2023 Mon Site Web. Tous droits réservés.</footer>
    
</body>
</html>
