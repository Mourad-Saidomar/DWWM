<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <title>Bootstrap</title>
</head>
<body class="bg-dark">
    <header class="bg-danger text-white text-center p-4">
        <h1>Structure de base Bootstrap</h1>
    </header>
    <main>
        <div class="container">
            
            <div class="row">
                <div class="col-12 border bg-primary text-white text-center p-2">col-12</div>
            </div>
            
            <div class="row">
                <div class="col-6 border bg-primary text-white text-center p-2">col-6</div>
                <div class="col-6 border bg-secondary text-white text-center p-2">col-6</div>                
            </div>
            
            <div class="row">
                <div class="col-4 border bg-primary text-white text-center p-2">col-4</div>
                <div class="col-4 border bg-secondary text-white text-center p-2">col-4</div>                
                <div class="col-4 border bg-success text-white text-center p-2">col-4</div>
            </div>
            
            <div class="row">
                <div class="col-3 border bg-primary text-white text-center p-2">col-3</div>
                <div class="col-3 border bg-secondary text-white text-center p-2">col-3</div>                
                <div class="col-3 border bg-success text-white text-center p-2">col-3</div>
                <div class="col-3 border bg-info text-white text-center p-2">col-3</div>
            </div>

            <div class="row">
                <div class="col-8 border bg-primary text-white text-center p-2">col-8</div>
                <div class="col-4 border bg-secondary text-white text-center p-2">col-4</div>                
            </div>
        </div>
        

    </main>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
